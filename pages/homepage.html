<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Float32 Benchmark (CPU / WebGPU)</title>
</head>
<body>

<h1>Float32 ベンチマーク</h1>

<label>
  <input type="checkbox" id="useGPU"> WebGPUを使用
</label>
<br><br>

<button onclick="run()">実行</button>
<pre id="result"></pre>

<script>
async function run() {
    const useGPU = document.getElementById("useGPU").checked;
    const resultEl = document.getElementById("result");

    if (useGPU) {
        if (!navigator.gpu) {
            resultEl.textContent = "WebGPU非対応ブラウザ";
            return;
        }
        await runGPU(resultEl);
    } else {
        runCPU(resultEl);
    }
}

// ================= CPU =================
function runCPU(resultEl) {
    const ITER = 50_000_000;

    let a = Math.fround(1.1);
    let b = Math.fround(2.2);
    let c = Math.fround(0.0);

    // warmup
    for (let i = 0; i < 1_000_000; i++) {
        c = Math.fround(a * b + c);
    }

    const start = performance.now();

    for (let i = 0; i < ITER; i++) {
        c = Math.fround(a * b + c);
        a = Math.fround(a + 0.000001);
        b = Math.fround(b + 0.000002);
    }

    const end = performance.now();
    const time = (end - start) / 1000;

    const flops = ITER * 2;
    const gflops = flops / time / 1e9;

    resultEl.textContent =
        `[CPU]\n時間: ${time.toFixed(3)} 秒\nGFLOPS: ${gflops.toFixed(3)}\n結果: ${c}`;
}

// ================= GPU =================
async function runGPU(resultEl) {
    const adapter = await navigator.gpu.requestAdapter();
    const device = await adapter.requestDevice();

    const SIZE = 1024 * 1024 * 4; // 要素数（増やすと負荷UP）
    const ITER = 100;

    const buffer = device.createBuffer({
        size: SIZE * 4,
        usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC
    });

    const shader = `
        @group(0) @binding(0)
        var<storage, read_write> data: array<f32>;

        @compute @workgroup_size(256)
        fn main(@builtin(global_invocation_id) id: vec3<u32>) {
            let i = id.x;
            if (i >= arrayLength(&data)) { return; }

            var a = f32(i) * 0.001;
            var b = 2.0;
            var c = 0.0;

            for (var j = 0u; j < ${ITER}u; j++) {
                c = a * b + c;
                a = a + 0.000001;
                b = b + 0.000002;
            }

            data[i] = c;
        }
    `;

    const module = device.createShaderModule({ code: shader });

    const pipeline = device.createComputePipeline({
        layout: "auto",
        compute: {
            module: module,
            entryPoint: "main"
        }
    });

    const bindGroup = device.createBindGroup({
        layout: pipeline.getBindGroupLayout(0),
        entries: [{
            binding: 0,
            resource: { buffer: buffer }
        }]
    });

    const encoder = device.createCommandEncoder();
    const pass = encoder.beginComputePass();

    pass.setPipeline(pipeline);
    pass.setBindGroup(0, bindGroup);

    const workgroups = Math.ceil(SIZE / 256);
    
    const start = performance.now();

    pass.dispatchWorkgroups(workgroups);
    pass.end();

    device.queue.submit([encoder.finish()]);
    await device.queue.onSubmittedWorkDone();

    const end = performance.now();

    const time = (end - start) / 1000;

    const flops = SIZE * ITER * 2;
    const gflops = flops / time / 1e9;

    resultEl.textContent =
        `[WebGPU]\n時間: ${time.toFixed(3)} 秒\nGFLOPS: ${gflops.toFixed(3)}`;
}
</script>

</body>
</html>
