<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Alpine on v86</title>
  <script src="https://copy.sh/v86/build/v86.js"></script>
</head>
<body>
  <div id="screen"></div>

  <script>
    const emulator = new V86({
      wasm_path: "https://copy.sh/v86/build/v86.wasm",
      memory_size: 256 * 1024 * 1024,

      screen_container: document.getElementById("screen"),

      bios: {
        url: "https://copy.sh/v86/bios/seabios.bin"
      },

      vga_bios: {
        url: "https://copy.sh/v86/bios/vgabios.bin"
      },

      cdrom: {
        url: "https://dl-cdn.alpinelinux.org/alpine/latest-stable/releases/x86/alpine-standard-3.19.0-x86.iso"
      },

      autostart: true
    });
  </script>
</body>
</html>
