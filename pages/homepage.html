<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>WebGPU Benchmark UI</title>
<style>
body {
  font-family: sans-serif;
  background: #111;
  color: #eee;
  padding: 20px;
}
.panel {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}
button {
  padding: 10px 20px;
  font-size: 16px;
}
progress {
  width: 100%;
  height: 20px;
}
#chart {
  width: 100%;
  height: 200px;
  background: #222;
}
</style>
</head>
<body>

<h1>Float32 Benchmark</h1>

<div class="panel">
  <label>
    <input type="checkbox" id="useGPU"> WebGPU使用
  </label>
  <br><br>
  <button onclick="start()">実行</button>
</div>

<div class="panel">
  <div>進行状況</div>
  <progress id="progress" value="0" max="100"></progress>
</div>

<div class="panel">
  <pre id="log"></pre>
</div>

<div class="panel">
  <canvas id="chart"></canvas>
</div>

<script>
const logEl = document.getElementById("log");
const progressEl = document.getElementById("progress");
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

canvas.width = canvas.clientWidth;
canvas.height = canvas.clientHeight;

let history = [];

function log(msg) {
  logEl.textContent += msg + "\n";
}

// ===== グラフ描画 =====
function drawChart() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const max = Math.max(...history, 1);

  history.forEach((v, i) => {
    const x = i * 30;
    const h = (v / max) * canvas.height;
    ctx.fillRect(x, canvas.height - h, 20, h);
  });
}

// ===== メイン =====
async function start() {
  logEl.textContent = "";
  progressEl.value = 0;

  const useGPU = document.getElementById("useGPU").checked;

  log(useGPU ? "[GPUモード]" : "[CPUモード]");

  if (useGPU) {
    await runGPU();
  } else {
    await runCPU();
  }
}

// ===== CPU =====
async function runCPU() {
  const ITER = 30_000_000;

  let a = Math.fround(1.1);
  let b = Math.fround(2.2);
  let c = Math.fround(0);

  const start = performance.now();

  for (let i = 0; i < ITER; i++) {
    c = Math.fround(a * b + c);

    if (i % 1_000_000 === 0) {
      progressEl.value = (i / ITER) * 100;
      await new Promise(r => setTimeout(r, 0));
    }
  }

  const end = performance.now();

  const time = (end - start) / 1000;
  const gflops = (ITER * 2) / time / 1e9;

  log(`時間: ${time.toFixed(3)} 秒`);
  log(`GFLOPS: ${gflops.toFixed(3)}`);

  history.push(gflops);
  drawChart();
}

// ===== GPU =====
async function runGPU() {
  if (!navigator.gpu) {
    log("WebGPU非対応");
    return;
  }

  const adapter = await navigator.gpu.requestAdapter();
  const device = await adapter.requestDevice();

  const SIZE = 1024 * 1024 * 2;
  const ITER = 100;

  const buffer = device.createBuffer({
    size: SIZE * 4,
    usage: GPUBufferUsage.STORAGE
  });

  const shader = `
    @group(0) @binding(0)
    var<storage, read_write> data: array<f32>;

    @compute @workgroup_size(256)
    fn main(@builtin(global_invocation_id) id: vec3<u32>) {
        let i = id.x;
        if (i >= arrayLength(&data)) { return; }

        var a = f32(i);
        var b = 2.0;
        var c = 0.0;

        for (var j = 0u; j < ${ITER}u; j++) {
            c = a * b + c;
            a = a + 0.000001;
            b = b + 0.000002;
        }

        data[i] = c;
    }
  `;

  const module = device.createShaderModule({ code: shader });

  const pipeline = device.createComputePipeline({
    layout: "auto",
    compute: { module, entryPoint: "main" }
  });

  const bindGroup = device.createBindGroup({
    layout: pipeline.getBindGroupLayout(0),
    entries: [{ binding: 0, resource: { buffer } }]
  });

  const encoder = device.createCommandEncoder();
  const pass = encoder.beginComputePass();

  pass.setPipeline(pipeline);
  pass.setBindGroup(0, bindGroup);

  const workgroups = Math.ceil(SIZE / 256);

  const start = performance.now();

  pass.dispatchWorkgroups(workgroups);
  pass.end();

  device.queue.submit([encoder.finish()]);
  await device.queue.onSubmittedWorkDone();

  progressEl.value = 100;

  const end = performance.now();

  const time = (end - start) / 1000;
  const gflops = (SIZE * ITER * 2) / time / 1e9;

  log(`時間: ${time.toFixed(3)} 秒`);
  log(`GFLOPS: ${gflops.toFixed(3)}`);

  history.push(gflops);
  drawChart();
}
</script>

</body>
</html>
